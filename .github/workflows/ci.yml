---
name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
    - run: uv sync --all-groups
    - run: uv run ruff check .
    - run: uv run ruff format --check .
    - run: uv run mypy --config-file=pyproject.toml src/lehrer tests
    - run: uv run pytest tests/ -v
    - run: uv run pre-commit run build-config-schema --all-files
    - run: uv run pre-commit run build-manifest-schema --all-files
    - run: uv run pre-commit run lehrer-core-boundary --all-files
