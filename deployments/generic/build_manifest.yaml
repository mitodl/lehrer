---
# yaml-language-server: $schema=../../build_manifest.schema.json
version: 1
defaults:
  settings_namespace: production
  platform_repo: https://github.com/openedx/edx-platform
  translations_repo: https://github.com/openedx/openedx-translations
  translations_branch: main
  node_version: '24'
release_python:
  master: '3.12'
# The committed settings/*/models/aqueduct.py was generated from this
# release's edx-platform source; only its cells can be drift-checked.
settings_model_release: master
cells:
- release: master
  deployment: generic
  platform_branch: master
  packages:
  - django-aqueduct==0.10.0
  - pydantic-settings[yaml]==2.14.2
  overrides: []
