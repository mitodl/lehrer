---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-config
  namespace: openedx
data:
  MYSQL_HOST: "mysql.openedx.svc.cluster.local"
  MYSQL_PORT: "3306"
  MYSQL_DB_NAME: "edxapp"
  MYSQL_USER: "edxapp"

  CELERY_BROKER_TRANSPORT: "redis"
  CELERY_BROKER_HOSTNAME: "redis-valkey.openedx.svc.cluster.local"
  CELERY_BROKER_USER: ""
  CELERY_BROKER_PASSWORD: ""
  CELERY_BROKER_VHOST: ""

  MONGODB_HOST: "mongodb-svc.openedx.svc.cluster.local"
  MONGODB_PORT: "27017"
  MONGODB_USER: "edxapp"
  MONGODB_DB: "edxapp"
  MONGODB_REPLICASET: "mongodb"
  MONGODB_AUTH_SOURCE: "admin"

  ELASTIC_SEARCH_HOST: "opensearch-cluster-master.openedx.svc.cluster.local"
  ELASTIC_SEARCH_PORT: "9200"

  LMS_BASE_URL: "http://localhost:8000"
  CMS_BASE_URL: "http://localhost:8010"

  STATIC_ROOT_BASE: "/openedx/staticfiles"

  LOG_DIR: "/openedx/data/var/log/edx"
  LOGGING_ENV: "sandbox"
  LOCAL_LOGLEVEL: "INFO"

  DEBUG: "false"
  ALLOWED_HOSTS: "*"
  HTTPS: "off"

  OL_SETTINGS_DIR: ""

  SERVICE_VARIANT: "cms"
