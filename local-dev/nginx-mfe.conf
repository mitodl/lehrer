server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: fall through to index.html for any path
    # not found as a static file. This allows React Router to handle routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; they are content-hashed by webpack.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
