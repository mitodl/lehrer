---
# MIT Open Learning legacy MFE build customizations.
#
# Consumed by lehrer's generic OpenedxMfe.build_legacy_configured.  Pipelines
# call `dagger call mfe build-legacy-configured` with --deployment-name and
# --release-name; the mappings below are resolved into the explicit
# build_legacy arguments (extra_slot_files / styles_file / extra_npm_bundles).

# Per-deployment stylesheet override copied into the MFE root.
styles:
  mitx: mitx-styles.scss
  mitx-staging: mitx-styles.scss
  mitxonline: mitxonline-styles.scss

# Per-MFE customizations keyed by MFE application name.
mfes:
  learning:
    extra_slot_files:
    - AIDrawerManagerSidebar.jsx
    - ResponsiveCourseTabs.jsx
      # The AI-drawer coordinator ships in two variants; pick by release.
    - dest: SidebarAIDrawerCoordinator.jsx
      by_release:
        ulmo: SidebarAIDrawerCoordinator.ulmo.jsx
        default: SidebarAIDrawerCoordinator.jsx
    extra_npm_bundles:
    - "@mitodl/smoot-design@^6.12.0|public/static/smoot-design"
