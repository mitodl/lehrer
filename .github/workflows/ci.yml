---
name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
    - run: uv sync --all-groups
    - run: uv run ruff check .
    - run: uv run ruff format --check .
    - run: uv run mypy --config-file=pyproject.toml src/lehrer tests
    - run: uv run pytest tests/ -v
    - run: uv run pre-commit run build-config-schema --all-files
    - run: uv run pre-commit run build-manifest-schema --all-files
    - run: uv run pre-commit run lehrer-core-boundary --all-files
