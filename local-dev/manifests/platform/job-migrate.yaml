---
# Runs Django migrations for the LMS and CMS against the shared edxapp MySQL
# database before the platform deployments start serving. The edxapp database
# and user are created by the MariaDB CR, but nothing creates the schema — so
# without this Job /heartbeat returns 500 (no tables).
#
# Tilt re-runs the Job whenever the platform image changes; `migrate` is
# idempotent, so re-runs are cheap once the schema is current.
apiVersion: batch/v1
kind: Job
metadata:
  name: edxapp-migrate
  namespace: openedx
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: edxapp-migrate
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        # Image tag is managed by Tilt via custom_build (same ref as the
        # platform deployments).
        image: lehrer-registry:5000/openedx-platform:dev
        command:
        - sh
        - -c
        - |
          set -e
          # Some data migrations (e.g. certificates/0003) write badge icon files
          # to MEDIA_ROOT via Django's FileSystemStorage.  The directory must
          # exist before migrations run; MEDIA_ROOT defaults to
          # /openedx/data/media/ (set in ProductionSettingsMixin).
          mkdir -p /openedx/data/media

          migrate() {
            python manage.py "$@" --settings=aqueduct --skip-checks
          }

          # --skip-checks: `migrate`'s system checks import the ROOT_URLCONF
          # (check_url_config), and some edx-platform url modules call
          # get_user_model() at import time, which fails during the migrate
          # command. Migrations themselves don't need the checks.
          # integrated_channels ships mariadb_uuid_conversion migrations for
          # blackboard, canvas, and integrated_channel that fire a raw
          # ALTER TABLE ... MODIFY uuid uuid NOT NULL.  On a fresh MariaDB
          # install these fail with "Table doesn't exist" because the table
          # creation in earlier migrations is version-gated.  Fake all three
          # on failure so the rest of the schema is applied on the retry.
          fake_mariadb_uuid_migrations() {
            app=$1
            migrate "$app" migrate blackboard 0025 --fake 2>/dev/null || true
            migrate "$app" migrate canvas 0041 --fake 2>/dev/null || true
            migrate "$app" migrate integrated_channel 0037 --fake 2>/dev/null || true
          }

          echo "==> LMS migrations"
          if ! migrate lms migrate; then
            echo "==> Migration failed; faking MariaDB UUID migrations and retrying"
            fake_mariadb_uuid_migrations lms
            migrate lms migrate
          fi

          echo "==> CMS migrations"
          if ! migrate cms migrate; then
            echo "==> Migration failed; faking MariaDB UUID migrations and retrying"
            fake_mariadb_uuid_migrations cms
            migrate cms migrate
          fi

          echo "==> Migrations complete"
        envFrom:
        - configMapRef:
            name: lms-config
        - secretRef:
            name: openedx-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
