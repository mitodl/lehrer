---
# bitnami/mongodb — single node, no replication, no persistence (dev use only)
auth:
  enabled: true
  rootPassword: "openedx-dev"  # pragma: allowlist secret
  username: "edxapp"
  password: "openedx-dev"  # pragma: allowlist secret
  database: "edxapp"

persistence:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
