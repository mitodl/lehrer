---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms
  namespace: openedx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms
  template:
    metadata:
      labels:
        app: lms
    spec:
      containers:
      - name: lms
        # Image tag is managed by Tilt via custom_build; lehrer-core.star
        # sets the correct registry prefix based on LEHRER_REGISTRY_K8S.
        image: lehrer-registry:5000/openedx-platform:dev
        command:
        - gunicorn
        - "--workers=2"
        - "--name=lms"
        - "--bind=0.0.0.0:8000"
        - "--max-requests=1000"
        - "--timeout=300"
        - "lms.wsgi:application"
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "lms.envs.aqueduct"
        envFrom:
        - configMapRef:
            name: lms-config
        - secretRef:
            name: openedx-secrets
        readinessProbe:
          httpGet:
            path: /heartbeat
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /heartbeat
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: edx-data
          mountPath: /openedx/data
      volumes:
      - name: edx-data
        emptyDir: {}
