---
# bitnami/mysql — single-node, no replication, no persistence (dev use only)
auth:
  rootPassword: "localdev"  # pragma: allowlist secret
  database: "edxapp"
  username: "edxapp"
  password: "edxapp"  # pragma: allowlist secret

primary:
  persistence:
    enabled: false
  configuration: |
    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    default-authentication-plugin=mysql_native_password
    # edx-platform requires permissive sql_mode for legacy migrations
    sql_mode=''
    max_allowed_packet=128M

  # Create the notes service database and grant access
  initdbScripts:
    init.sql: |
      CREATE DATABASE IF NOT EXISTS notes CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      GRANT ALL PRIVILEGES ON notes.* TO 'edxapp'@'%';
      CREATE DATABASE IF NOT EXISTS edxapp_csmh CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      GRANT ALL PRIVILEGES ON edxapp_csmh.* TO 'edxapp'@'%';
      FLUSH PRIVILEGES;

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1"
